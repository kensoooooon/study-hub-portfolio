<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-4">
    <h2 class="mb-4">お名前登録</h2>
    <form method="post" id="nameForm" class="needs-validation" novalidate>
        {% csrf_token %}
        <div class="mb-3">
            <label for="last_name" class="form-label">姓:</label>
            <input type="text" name="last_name" id="last_name" class="form-control" placeholder="例: 山田" required>
            <div class="invalid-feedback">姓を入力してください。</div>
        </div>
        <div class="mb-3">
            <label for="first_name" class="form-label">名:</label>
            <input type="text" name="first_name" id="first_name" class="form-control" placeholder="例: 太郎" required>
            <div class="invalid-feedback">名を入力してください。</div>
        </div>
        <input type="hidden" name="t" value="{{ token }}">
        <button type="submit" id="submitButton" class="btn btn-primary" disabled>登録</button>
    </form>
</div>

<script>
    // フォーム要素を取得
    const lastNameInput = document.getElementById('last_name');
    const firstNameInput = document.getElementById('first_name');
    const submitButton = document.getElementById('submitButton');

    // 入力の変化を監視
    function toggleSubmitButton() {
        if (lastNameInput.value.trim() !== '' && firstNameInput.value.trim() !== '') {
            submitButton.disabled = false; // ボタンを有効化
        } else {
            submitButton.disabled = true; // ボタンを無効化
        }
    }

    // イベントリスナーを追加
    lastNameInput.addEventListener('input', toggleSubmitButton);
    firstNameInput.addEventListener('input', toggleSubmitButton);

    // Bootstrapのカスタムバリデーションを追加（オプション）
    (function () {
        'use strict'
        const forms = document.querySelectorAll('.needs-validation');
        Array.from(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>
