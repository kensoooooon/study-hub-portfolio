{% extends "base.html" %}
{% load form_filters %}  <!-- これでカスタムフィルターを読み込む -->

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h2 class="mb-0">生徒を教室に割り当て</h2>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="{{ form.student.id_for_label }}" class="form-label">生徒を選択</label>
                    {{ form.student|add_class:"form-select" }}
                </div>

                <div class="mb-3">
                    <label for="{{ form.classroom.id_for_label }}" class="form-label">教室を選択</label>
                    {{ form.classroom|add_class:"form-select" }}
                </div>

                <button type="submit" class="btn btn-primary w-100">割り当てる</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
