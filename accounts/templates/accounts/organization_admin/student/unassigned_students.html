{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-3">未所属の生徒一覧</h2>

    {% if students %}
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>名前</th>
                    <th>LINE ID</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.username }}</td>
                    <td>{{ student.line_user_id }}</td>
                    <td>
                        <a href="{% url 'organization_admin:assign_classroom' student.id %}" class="btn btn-primary btn-sm">
                            割り当て
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
    <div class="alert alert-info" role="alert">
        現在、未所属の生徒はいません。
    </div>
    {% endif %}
</div>
{% endblock %}
