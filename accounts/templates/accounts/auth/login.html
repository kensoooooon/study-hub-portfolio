{% extends 'base.html' %}

{% block title %}ログイン{% endblock %}

{% block content %}
<div class="card shadow-sm p-4">
    <h1 class="mb-4">ログイン</h1>
    <form method="post">
        {% csrf_token %}
        {% if form.errors %}
            <div class="alert alert-danger">
                ユーザー名またはパスワードが正しくありません。
            </div>
        {% endif %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">ログイン</button>
    </form>
</div>
{% endblock %}
