name: CI

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Django Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: my-local-db
          POSTGRES_USER: db-user
          POSTGRES_PASSWORD: ${{ secrets.CI_DATABASE_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U db-user -d my-local-db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      ENV: local
      DJANGO_SECRET_KEY: ${{ secrets.CI_DJANGO_SECRET_KEY }}
      LINE_CHANNEL_SECRET: ${{ secrets.CI_LINE_CHANNEL_SECRET }}
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.CI_LINE_CHANNEL_ACCESS_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.CI_OPENAI_API_KEY }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.CI_GOOGLE_APPLICATION_CREDENTIALS }}
      DATABASE_PASSWORD: ${{ secrets.CI_DATABASE_PASSWORD }}
      TEACHER_DEFAULT_PASSWORD: ${{ secrets.CI_TEACHER_DEFAULT_PASSWORD }}
      STUDENT_DEFAULT_PASSWORD: ${{ secrets.CI_STUDENT_DEFAULT_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django test suite
        run: python manage.py test
