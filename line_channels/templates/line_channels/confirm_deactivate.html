{% extends 'base.html' %}

{% block title %}チャンネル無効化確認{% endblock %}

{% block breadcrumbs %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item">
            <a href="{% url 'line_channels:list' %}">チャンネル一覧</a>
        </li>
        <li class="breadcrumb-item">
            <a href="{% url 'line_channels:detail' channel.id %}">チャンネル詳細</a>
        </li>
        <li class="breadcrumb-item active" aria-current="page">チャンネル無効化確認</li>
    </ol>
</nav>
{% endblock %}


{% block content %}
<div class="container mt-4">
    <p>チャンネルを無効化しますか?</p>
    <form method="post" action="{% url 'line_channels:deactivate' channel.id %}" class="mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger" id="deactivateBtn">無効化</button>
    </form>
</div>

<a href="{% url 'line_channels:detail' channel.id %}" class="btn btn-secondary mt-2">戻る</a>
{% endblock %}


{% block script %}
    <script>
        // 二重送信防止（JSの流れ）
        // 1) submit 発火時にボタンを無効化
        // 2) 送信後のページ遷移が起きなければ一定時間で再有効化（ネットワーク異常の保険）
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('deactivateBtn');
            if (!btn) return;
            const form = btn.closest('form');
            if (!form) return;
            form.addEventListener('submit', () => { btn.disabled = true; });
        });
    </script>
{% endblock %}
